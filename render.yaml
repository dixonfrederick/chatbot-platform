services:
  - type: web
    name: chatbot-yellowai-dixon
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_API_KEY
        sync: false
    disks:
      - name: chatbot-yellowai-dixon-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
