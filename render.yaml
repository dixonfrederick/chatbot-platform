services:
  - type: web
    name: chatbot-platform
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
    disks:
      - name: chatbot-platform-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
